# Deploy AI Eval Framework Docs to GitHub Pages.
# Repo Settings → Pages → Source: "GitHub Actions".
#
# If this site lives in a subfolder (e.g. docs-site/), this workflow assumes
# you run it from the repo root and that the Next.js app is in docs-site/.
# Adjust 'working-directory' and 'publish_dir' if your structure differs.
# Set GITHUB_PAGES_BASE to match your Pages URL (e.g. /repo-name/ for project Pages).

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "docs-site/package-lock.json"

      - name: Install
        run: npm ci
        working-directory: docs-site

      - name: Build
        run: npm run build
        working-directory: docs-site
        env:
          # For https://<org>.github.io/<repo>/ use /<repo>/
          GITHUB_PAGES_BASE: /ai-eval-framework-docs/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site/out
